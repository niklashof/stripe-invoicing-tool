<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Line Items – Stripe VAT Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <h1 id="page-title">Export Line Items</h1>
      <div>
        <a href="/" class="btn btn-secondary">Back</a>
      </div>
    </div>

    <div class="card" id="export-card">
      <form id="export-form">
        <label for="from">From</label>
        <input type="date" id="from" name="from" required>

        <label for="to">To</label>
        <input type="date" id="to" name="to" required>

        <div class="btn-row">
          <button type="button" class="btn btn-secondary" id="preset-this-month">This Month</button>
          <button type="button" class="btn btn-secondary" id="preset-last-month">Last Month</button>
        </div>

        <div class="hint" id="account-hint" style="margin-top: 16px;"></div>
        <div class="hint" style="margin-top: 8px;">Exports are limited to one year per download.</div>

        <div class="btn-row">
          <button type="submit" class="btn btn-primary">Download CSV</button>
          <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function setThisMonth() {
      const now = new Date();
      const from = new Date(now.getFullYear(), now.getMonth(), 1);
      document.getElementById("from").value = formatDate(from);
      document.getElementById("to").value = formatDate(now);
    }

    function setLastMonth() {
      const now = new Date();
      const from = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const to = new Date(now.getFullYear(), now.getMonth(), 0);
      document.getElementById("from").value = formatDate(from);
      document.getElementById("to").value = formatDate(to);
    }

    async function init() {
      const user = await checkAuth();
      if (!user) {
        window.location.href = "/login.html";
        return;
      }
      if (!slug) {
        showAlert(document.getElementById("export-card"), "Missing account slug");
        return;
      }

      try {
        const account = await api(`/accounts/${slug}`);
        document.getElementById("page-title").textContent = `Export Line Items – ${account.name}`;
        document.getElementById("account-hint").textContent = `Exporting line items for ${account.name} (${account.slug}).`;
        setThisMonth();
      } catch (err) {
        showAlert(document.getElementById("export-card"), err.message);
      }
    }

    document.getElementById("preset-this-month").addEventListener("click", setThisMonth);
    document.getElementById("preset-last-month").addEventListener("click", setLastMonth);

    document.getElementById("export-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      if (!from || !to) {
        showAlert(document.getElementById("export-card"), "Choose both dates before exporting.");
        return;
      }
      if (from > to) {
        showAlert(document.getElementById("export-card"), '"From" must be on or before "To".');
        return;
      }
      try {
        await downloadBlob(`/accounts/${encodeURIComponent(slug)}/exports/line-items.csv?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
      } catch (err) {
        showAlert(document.getElementById("export-card"), err.message);
      }
    });

    init();
  </script>
</body>
</html>
