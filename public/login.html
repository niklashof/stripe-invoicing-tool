<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Stripe VAT Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="card" id="login-card" style="max-width: 400px; margin: 80px auto;">
      <h2 id="form-title">Login</h2>
      <form id="auth-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">

        <div class="btn-row">
          <button type="submit" class="btn btn-primary" id="submit-btn">Login</button>
        </div>
      </form>
      <p id="setup-note" class="hint" style="display:none; margin-top: 16px;"></p>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/login.js"></script>
</body>
</html>
