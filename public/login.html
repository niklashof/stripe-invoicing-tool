<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Stripe VAT Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="card" id="login-card" style="max-width: 400px; margin: 80px auto;">
      <h2 id="form-title">Login</h2>
      <form id="auth-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">

        <div class="btn-row">
          <button type="submit" class="btn btn-primary" id="submit-btn">Login</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    let isSetup = false;

    async function init() {
      // Already logged in?
      const user = await checkAuth();
      if (user) {
        window.location.href = "/";
        return;
      }

      // First-run setup?
      const { needed } = await api("/setup-needed");
      if (needed) {
        isSetup = true;
        document.getElementById("form-title").textContent = "Create Admin Account";
        document.getElementById("submit-btn").textContent = "Create Account";
      }
    }

    document.getElementById("auth-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const card = document.getElementById("login-card");
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      try {
        const endpoint = isSetup ? "/setup" : "/login";
        await api(endpoint, {
          method: "POST",
          body: JSON.stringify({ username, password }),
        });
        window.location.href = "/";
      } catch (err) {
        showAlert(card, err.message);
      }
    });

    init();
  </script>
</body>
</html>
